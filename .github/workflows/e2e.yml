name: e2e-smoke

# Run against the live Vercel deployment.
# Triggers on push to main (after Vercel auto-deploys) and on PRs.
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
  workflow_dispatch: # Manual trigger from the Actions tab

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # On push to main, Vercel deploys before this workflow finishes building,
      # but in practice the deploy may still be propagating. Sleep briefly.
      - name: Wait for deploy to propagate
        if: github.event_name == 'push'
        run: sleep 30

      - name: Run smoke tests against production
        env:
          BASE_URL: https://slidelang.vercel.app
          CI: "true"
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
